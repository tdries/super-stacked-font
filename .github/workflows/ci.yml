name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Test
        run: python -m pytest -q
      - name: Build all four fonts from source
        run: python -m superstack.build_font
      - name: Upload built fonts
        uses: actions/upload-artifact@v4
        with:
          name: super-stacked-otf
          path: |
            out/*.otf
            out/font_data.json
