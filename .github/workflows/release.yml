name: Release

# On a version tag (v*), rebuild the fonts from source and attach them to the
# GitHub Release so non-technical users get a one-click download.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Test
        run: python -m pytest -q
      - name: Build fonts
        run: python -m superstack.build_font
      - name: Package web kit
        run: |
          mkdir -p dist
          cp out/*.otf dist/
          cp OFL.txt dist/
          zip -j dist/super-stacked-web.zip out/*.otf out/font_data.json out/superstacked.js out/index.html out/showcase.html OFL.txt
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.otf
            dist/super-stacked-web.zip
            OFL.txt
